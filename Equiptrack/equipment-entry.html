<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EquipTrack — Entry</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
  :root{
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--border:#2a2f3f;
    --accent:#00c2ff;--accent2:#ff6b35;--accent3:#00ff9d;
    --text:#d0d8f0;--muted:#5a6180;--danger:#ff3b5c;--warn:#ffb800;
    --r:6px;--fh:'Rajdhani',sans-serif;--fm:'Share Tech Mono',monospace;--fb:'Exo 2',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;
    background-image:radial-gradient(ellipse at 20% 0%,rgba(0,194,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse at 80% 100%,rgba(255,107,53,.05) 0%,transparent 60%);}

  /* LOGIN */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
  .login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:2.5rem;width:100%;max-width:400px;}
  .login-logo{font-family:var(--fh);font-size:1.8rem;font-weight:700;letter-spacing:3px;
    color:var(--accent);text-transform:uppercase;text-align:center;margin-bottom:.25rem;}
  .login-logo span{color:var(--muted);font-weight:400;}
  .login-sub{font-family:var(--fm);font-size:.72rem;letter-spacing:2px;color:var(--muted);
    text-align:center;margin-bottom:2rem;text-transform:uppercase;}
  .login-fi{display:flex;flex-direction:column;gap:6px;margin-bottom:1.2rem;}
  .login-fi label{font-family:var(--fm);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .login-fi input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
    color:var(--text);padding:11px 14px;font-family:var(--fb);font-size:.95rem;outline:none;
    transition:border-color .2s;}
  .login-fi input:focus{border-color:var(--accent);}
  .login-btn{width:100%;font-family:var(--fh);font-size:1rem;font-weight:700;letter-spacing:2px;
    text-transform:uppercase;background:var(--accent);color:#000;border:none;padding:12px;
    border-radius:var(--r);cursor:pointer;transition:all .2s;margin-top:.5rem;}
  .login-btn:hover{opacity:.85;}
  .login-err{font-family:var(--fm);font-size:.75rem;color:var(--danger);text-align:center;
    margin-top:.75rem;letter-spacing:.5px;min-height:1rem;}
  .login-loading{text-align:center;font-family:var(--fm);font-size:.75rem;color:var(--muted);
    margin-top:.75rem;letter-spacing:1px;}

  /* APP */
  #app-screen{display:none;}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;
    display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;}
  .logo{font-family:var(--fh);font-size:1.4rem;font-weight:700;letter-spacing:2px;color:var(--accent);text-transform:uppercase;}
  .logo span{color:var(--muted);font-weight:400;}
  .hright{display:flex;align-items:center;gap:1rem;}
  .user-info{font-family:var(--fm);font-size:.75rem;color:var(--muted);letter-spacing:1px;}
  .user-info strong{color:var(--accent3);}
  .btn-logout{font-family:var(--fm);font-size:.75rem;background:transparent;border:1px solid var(--border);
    color:var(--muted);padding:5px 12px;border-radius:var(--r);cursor:pointer;
    letter-spacing:1px;text-transform:uppercase;transition:all .2s;}
  .btn-logout:hover{border-color:var(--danger);color:var(--danger);}
  nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 2rem;}
  .tb{font-family:var(--fh);font-size:.95rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;
    background:none;border:none;color:var(--muted);padding:14px 28px;cursor:pointer;
    border-bottom:2px solid transparent;transition:all .2s;}
  .tb:hover{color:var(--text);}
  .tb.active{color:var(--accent);border-bottom:2px solid var(--accent);}
  .tc{display:none;padding:2rem;max-width:900px;margin:0 auto;}
  .tc.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:2rem;margin-bottom:1.5rem;}
  .ctitle{font-family:var(--fh);font-size:1.1rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    color:var(--accent);margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid var(--border);
    display:flex;align-items:center;gap:10px;}
  .ctitle::before{content:'';width:3px;height:18px;background:var(--accent);border-radius:2px;}
  .fg{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
  .fi{display:flex;flex-direction:column;gap:6px;}
  label{font-family:var(--fm);font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  input,select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
    color:var(--text);padding:10px 14px;font-family:var(--fb);font-size:.9rem;outline:none;
    transition:border-color .2s;width:100%;}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(0,194,255,.1);}
  input.err{border-color:var(--danger);}
  select option{background:var(--surface2);}
  .fa{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap;}
  .bp{font-family:var(--fh);font-size:.95rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    background:var(--accent);color:#000;border:none;padding:10px 28px;border-radius:var(--r);
    cursor:pointer;transition:all .2s;}
  .bp:hover{opacity:.85;transform:translateY(-1px);}
  .bp:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .field-err{font-family:var(--fm);font-size:.7rem;color:var(--danger);margin-top:3px;}

  /* STATS */
  .statbox{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;}
  .scard{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.2rem 1.6rem;flex:1;min-width:140px;}
  .sl{font-family:var(--fm);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
  .sv{font-family:var(--fh);font-size:2rem;font-weight:700;line-height:1;}
  .green{color:var(--accent3);} .blue{color:var(--accent);} .orange{color:var(--accent2);}

  /* TABLE */
  .tw{overflow-x:auto;margin-top:1rem;}
  table{width:100%;border-collapse:collapse;font-size:.85rem;}
  thead tr{background:var(--surface2);border-bottom:1px solid var(--border);}
  th{font-family:var(--fm);font-size:.68rem;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--muted);padding:10px 14px;text-align:left;white-space:nowrap;}
  td{padding:10px 14px;border-bottom:1px solid rgba(42,47,63,.5);vertical-align:middle;}
  tr:hover td{background:rgba(255,255,255,.02);}
  .tag{font-family:var(--fm);font-size:.7rem;padding:3px 8px;border-radius:3px;letter-spacing:1px;}
  .tout{background:rgba(255,107,53,.15);color:var(--accent2);border:1px solid rgba(255,107,53,.3);}
  .tpend{background:rgba(255,184,0,.12);color:var(--warn);border:1px solid rgba(255,184,0,.3);}
  .rc{appearance:none;width:18px;height:18px;border:2px solid var(--border);border-radius:4px;
    cursor:pointer;position:relative;transition:all .2s;background:var(--surface2);flex-shrink:0;}
  .rc:checked{background:var(--accent3);border-color:var(--accent3);}
  .rc:checked::after{content:'✓';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-size:11px;color:#000;font-weight:bold;}
  .rcell{display:flex;align-items:center;gap:10px;}
  #toast{position:fixed;bottom:2rem;right:2rem;background:var(--surface2);border:1px solid var(--border);
    border-left:3px solid var(--accent3);color:var(--text);padding:12px 20px;border-radius:var(--r);
    font-family:var(--fm);font-size:.82rem;opacity:0;transform:translateY(10px);
    transition:all .3s;z-index:999;pointer-events:none;max-width:320px;}
  #toast.show{opacity:1;transform:translateY(0);}
  #toast.err{border-left-color:var(--danger);}
  .empty{text-align:center;padding:3rem;color:var(--muted);font-family:var(--fm);font-size:.82rem;}
  .access-denied{display:flex;align-items:center;justify-content:center;min-height:60vh;
    flex-direction:column;gap:1rem;text-align:center;}
  .access-denied h2{font-family:var(--fh);font-size:1.5rem;color:var(--danger);letter-spacing:2px;}
  .access-denied p{font-family:var(--fm);font-size:.82rem;color:var(--muted);}
  @media(max-width:600px){
    .fg{grid-template-columns:1fr;} .tb{padding:12px 14px;font-size:.8rem;}
    .tc{padding:1.2rem;} header{padding:0 1rem;}
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Equip<span>Track</span></div>
    <div class="login-sub">Entry Portal</div>
    <div class="login-fi">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="login-fi">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="Enter password" autocomplete="current-password"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Login</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <header>
    <div class="logo">Equip<span>Track</span></div>
    <div class="hright">
      <div class="user-info">Logged in as <strong id="display-name"></strong></div>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </header>
  <nav>
    <button class="tb active" onclick="switchTab('t1',this)">Equipment Log</button>
    <button class="tb" onclick="switchTab('t2',this)">Borrow Log</button>
    <button class="tb" onclick="switchTab('t3',this)">Equipment Status</button>
  </nav>

  <!-- TAB 1: EQUIPMENT LOG -->
  <div id="t1" class="tc active">
    <div class="card">
      <div class="ctitle">New Equipment Entry</div>
      <div class="fg">
        <div class="fi">
          <label>Equipment Number</label>
          <input id="e-num" placeholder="e.g. EQ-001"/>
          <span class="field-err" id="e-num-err"></span>
        </div>
        <div class="fi"><label>Type</label><input id="e-type" placeholder="e.g. Power Drill"/></div>
        <div class="fi"><label>Brand</label><input id="e-brand" placeholder="e.g. Bosch"/></div>
        <div class="fi"><label>Date of Log</label><input type="date" id="e-date"/></div>
        <div class="fi">
          <label>Status</label>
          <select id="e-status">
            <option value="">-- Select Status --</option>
            <option>Good</option><option>Damaged</option>
            <option>Under Repair</option><option>For Disposal</option><option>Missing</option>
          </select>
        </div>
      </div>
      <div class="fa">
        <button class="bp" id="btn-equip" onclick="submitEquip()">Submit Entry</button>
      </div>
    </div>
    <!-- OFFLINE PENDING -->
    <div class="card" id="offline-card" style="display:none">
      <div class="ctitle">Pending Offline Records</div>
      <div class="tw">
        <table>
          <thead><tr><th>Eq. No.</th><th>Type</th><th>Brand</th><th>Date of Log</th><th>Status</th><th>State</th></tr></thead>
          <tbody id="offline-tb"></tbody>
        </table>
      </div>
      <div class="fa"><button class="bp" onclick="syncOffline()" style="background:var(--warn);margin-top:1rem">⟳ Sync Now</button></div>
    </div>
  </div>

  <!-- TAB 2: BORROW LOG -->
  <div id="t2" class="tc">
    <div class="statbox">
      <div class="scard"><div class="sl">Currently Working</div><div class="sv green" id="stat-working">—</div></div>
      <div class="scard"><div class="sl">Currently Borrowed</div><div class="sv orange" id="stat-borrowed">—</div></div>
      <div class="scard"><div class="sl">Total Equipment</div><div class="sv blue" id="stat-total">—</div></div>
    </div>
    <div class="card">
      <div class="ctitle">Log Borrow Entry</div>
      <div class="fg">
        <div class="fi">
          <label>Equipment Number</label>
          <input id="b-num" placeholder="e.g. EQ-001"/>
          <span class="field-err" id="b-num-err"></span>
        </div>
        <div class="fi"><label>Date of Borrow</label><input type="date" id="b-date"/></div>
        <div class="fi"><label>Borrower Name</label><input id="b-who" placeholder="Full name"/></div>
        <div class="fi"><label>Location Transferred</label><input id="b-loc" placeholder="e.g. Site B"/></div>
      </div>
      <div class="fa"><button class="bp" onclick="submitBorrow()">Log Borrow</button></div>
    </div>
    <div class="card">
      <div class="ctitle">Active Borrows</div>
      <div class="tw">
        <table>
          <thead><tr><th>Eq. No.</th><th>Borrower</th><th>Date</th><th>Location</th><th>Mark Returned</th></tr></thead>
          <tbody id="btbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB 3: EQUIPMENT STATUS -->
  <div id="t3" class="tc">
    <div class="card">
      <div class="ctitle">Log Equipment Status</div>
      <div class="fg">
        <div class="fi">
          <label>Equipment Number</label>
          <input id="s-num" placeholder="e.g. EQ-001"/>
          <span class="field-err" id="s-num-err"></span>
        </div>
        <div class="fi">
          <label>Status</label>
          <select id="s-stat">
            <option value="">-- Select Status --</option>
            <option>Good</option><option>Damaged</option>
            <option>Under Repair</option><option>For Disposal</option>
            <option>Missing</option><option>Returned</option>
          </select>
        </div>
        <div class="fi">
          <label>Date</label>
          <input type="date" id="s-date"/>
        </div>
      </div>
      <div class="fa"><button class="bp" onclick="submitStatus()">Log Status</button></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
  query, where, updateDoc, serverTimestamp, orderBy }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyAYfbSMhJMJ-TWZ-T1jPAAogst8SuMdmiA",
  authDomain: "equiptrack-e1011.firebaseapp.com",
  projectId: "equiptrack-e1011",
  storageBucket: "equiptrack-e1011.firebasestorage.app",
  messagingSenderId: "468749948486",
  appId: "1:468749948486:web:8bbcd38e0435e92d86dc47"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ── STATE ─────────────────────────────────────────────────────
let currentUser = null;
let currentRole = null;
let allEquip    = [];
let allStatus   = [];
let allBorrows  = [];
let offlineEquip   = JSON.parse(localStorage.getItem('offlineEquip')   || '[]');
let offlineBorrows = JSON.parse(localStorage.getItem('offlineBorrows') || '[]');
let isSyncing = false;

// ── AUTH ──────────────────────────────────────────────────────
onAuthStateChanged(auth, async user => {
  if (user) {
    const snap = await getDoc(doc(db, 'users', user.uid));
    if (!snap.exists()) { await signOut(auth); return; }
    const data = snap.data();
    currentUser = user;
    currentRole = data.role;
    const allowed = ['admin','encoder'];
    if (!allowed.includes(currentRole)) {
      document.getElementById('login-screen').innerHTML = `
        <div class="access-denied">
          <h2>Access Denied</h2>
          <p>Your account does not have permission to access this page.</p>
          <button class="bp" onclick="doLogout()" style="margin-top:1rem">Logout</button>
        </div>`;
      document.getElementById('login-screen').style.display = 'flex';
      return;
    }
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('display-name').textContent = data.username || user.email;
    setToday();
    await loadAllData();
    renderBorrows();
    renderOfflineTable();
    if (offlineBorrows.length && navigator.onLine) syncOfflineBorrows();
  } else {
    currentUser = null;
    currentRole = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app-screen').style.display = 'none';
  }
});

window.doLogin = async function() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl    = document.getElementById('login-err');
  const btn      = document.querySelector('.login-btn');
  errEl.textContent = '';
  if (!username || !password) { errEl.textContent = 'Please enter username and password.'; return; }
  btn.textContent = 'Logging in...';
  btn.disabled = true;
  try {
    const email = username.toLowerCase() + '@equiptrack.app';
    await signInWithEmailAndPassword(auth, email, password);
  } catch(e) {
    console.error('Login error:', e.code, e.message);
    if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
      errEl.textContent = 'Invalid username or password.';
    } else if (e.code === 'auth/network-request-failed') {
      errEl.textContent = 'Network error. Check your connection.';
    } else if (e.code === 'auth/too-many-requests') {
      errEl.textContent = 'Too many attempts. Try again later.';
    } else {
      errEl.textContent = 'Login failed: ' + e.message;
    }
  } finally {
    btn.textContent = 'Login';
    btn.disabled = false;
  }
};

window.doLogout = async function() {
  await signOut(auth);
};

// ── LOAD DATA ─────────────────────────────────────────────────
async function loadAllData() {
  try {
    const [eSnap, bSnap, sSnap] = await Promise.all([
      getDocs(collection(db, 'equipment')),
      getDocs(collection(db, 'borrowLog')),
      getDocs(collection(db, 'statusLog')),
    ]);
    allEquip   = eSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allBorrows = bSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    allStatus  = sSnap.docs.map(d => ({ id: d.id, ...d.data() }));
    updateStats();
  } catch(e) { console.error('loadAllData error:', e); }
}

// ── UTILS ─────────────────────────────────────────────────────
function setToday() {
  const t = new Date().toISOString().split('T')[0];
  document.getElementById('e-date').value = t;
  document.getElementById('b-date').value = t;
  document.getElementById('s-date').value = t;
}

window.switchTab = function(id, btn) {
  document.querySelectorAll('.tc').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(x => x.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
};

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show' + (err ? ' err' : '');
  setTimeout(() => t.className = '', 3500);
}

function setFieldErr(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
  const inp = document.getElementById(id.replace('-err',''));
  if (inp) msg ? inp.classList.add('err') : inp.classList.remove('err');
}

function v(id) { return document.getElementById(id).value.trim(); }

function getLatestStatus(num) {
  const matches = allStatus.filter(s => s.num === num);
  if (!matches.length) return null;
  // Sort by date descending, return most recent
  matches.sort((a,b) => new Date(b.date) - new Date(a.date));
  return matches[0].status;
}

function isCurrentlyBorrowed(num) {
  return allBorrows.some(b => b.num === num && b.returned !== true && b.returned !== 'Yes');
}

function updateStats() {
  const borrowed = allBorrows.filter(b => b.returned !== true && b.returned !== 'Yes').map(b => b.num);
  const working  = allEquip.filter(e => getLatestStatus(e.num) === 'Good' && !borrowed.includes(e.num));
  document.getElementById('stat-working').textContent  = working.length;
  document.getElementById('stat-borrowed').textContent = borrowed.length;
  document.getElementById('stat-total').textContent    = allEquip.length;
}

// ── EQUIPMENT ─────────────────────────────────────────────────
window.submitEquip = async function() {
  setFieldErr('e-num-err', '');
  const num    = v('e-num'), type = v('e-type'), brand = v('e-brand');
  const dateLog = v('e-date'), status = v('e-status');
  if (!num||!type||!brand||!dateLog||!status) { toast('Fill all fields.',true); return; }

  // Uniqueness check — sheet + offline + queue
  const inSheet   = allEquip.some(e => e.num.toLowerCase() === num.toLowerCase());
  const inOffline = offlineEquip.some(e => e.num.toLowerCase() === num.toLowerCase());
  if (inSheet || inOffline) {
    setFieldErr('e-num-err','Equipment number already exists.');
    toast('Equipment number already exists!',true); return;
  }

  const dateUpload = new Date().toISOString();
  try {
    if (navigator.onLine) {
      const eRef = await addDoc(collection(db,'equipment'), { num, type, brand, dateLog, dateUpload });
      await setDoc(doc(db,'statusLog', num), { num, status, date: dateUpload });
      allEquip.push({ id: eRef.id, num, type, brand, dateLog, dateUpload });
      allStatus.push({ num, status, date: dateUpload });
      updateStats();
      toast('Equipment logged!');
    } else {
      addOfflineEquip({ num, type, brand, dateLog, status, dateUpload });
      toast('Saved offline.');
    }
    ['e-num','e-type','e-brand'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('e-status').value = '';
    setToday();
  } catch(e) {
    addOfflineEquip({ num, type, brand, dateLog, status, dateUpload });
    toast('Error — saved offline.');
  }
};

// ── OFFLINE ───────────────────────────────────────────────────
function addOfflineEquip(record) {
  offlineEquip.push(record);
  localStorage.setItem('offlineEquip', JSON.stringify(offlineEquip));
  renderOfflineTable();
}

function renderOfflineTable() {
  const card = document.getElementById('offline-card');
  const tb   = document.getElementById('offline-tb');
  if (!offlineEquip.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  tb.innerHTML = offlineEquip.map(e => `
    <tr>
      <td><span style="font-family:var(--fm);color:var(--accent)">${e.num}</span></td>
      <td>${e.type}</td><td>${e.brand}</td><td>${e.dateLog}</td><td>${e.status}</td>
      <td><span class="tag tpend">PENDING</span></td>
    </tr>`).join('');
}

window.syncOffline = async function() {
  if (!navigator.onLine) { toast('No connection.',true); return; }
  if (!offlineEquip.length) { toast('Nothing to sync.'); return; }
  let ok = 0, fail = [];
  for (const e of offlineEquip) {
    // Check uniqueness before syncing
    const inSheet = allEquip.some(x => x.num.toLowerCase() === e.num.toLowerCase());
    if (inSheet) { toast(`${e.num} already exists — skipped.`,true); fail.push(e); continue; }
    try {
      const eRef = await addDoc(collection(db,'equipment'), {
        num: e.num, type: e.type, brand: e.brand, dateLog: e.dateLog, dateUpload: e.dateUpload
      });
      await setDoc(doc(db,'statusLog', e.num), { num: e.num, status: e.status, date: e.dateUpload });
      allEquip.push({ id: eRef.id, ...e });
      ok++;
    } catch(err) { fail.push(e); }
  }
  offlineEquip = fail;
  localStorage.setItem('offlineEquip', JSON.stringify(offlineEquip));
  renderOfflineTable();
  await loadAllData();
  toast(`Synced ${ok} record(s)${fail.length ? ` · ${fail.length} failed` : '!'}`);
};

// ── SYNC OFFLINE BORROWS ──────────────────────────────────────
async function syncOfflineBorrows() {
  if (!navigator.onLine || !offlineBorrows.length || isSyncing) return;
  isSyncing = true;
  let ok = 0, fail = [];
  for (const entry of offlineBorrows) {
    // Check not already borrowed in sheet before syncing
    const alreadyOut = allBorrows.some(b =>
      b.num === entry.num && b.returned !== true && b.returned !== 'Yes' &&
      !b.id.startsWith('offline_')
    );
    if (alreadyOut) { fail.push(entry); continue; }
    try {
      const ref = await addDoc(collection(db,'borrowLog'), {
        num: entry.num, date: entry.date, borrower: entry.borrower,
        location: entry.location, returned: false, returnDate: null,
        createdAt: entry.createdAt
      });
      // Replace offline entry in allBorrows with real one
      const idx = allBorrows.findIndex(b => b.id === 'offline_'+entry.createdAt);
      if (idx >= 0) allBorrows[idx] = { id: ref.id, ...entry };
      ok++;
    } catch(e) { fail.push(entry); }
  }
  offlineBorrows = fail;
  localStorage.setItem('offlineBorrows', JSON.stringify(offlineBorrows));
  isSyncing = false;
  if (ok > 0) { renderBorrows(); toast(`Synced ${ok} borrow(s)!`); }
}

// Auto-sync when coming back online
window.addEventListener('online', () => {
  if (offlineBorrows.length) syncOfflineBorrows();
});

// ── BORROW ────────────────────────────────────────────────────
window.submitBorrow = async function() {
  setFieldErr('b-num-err','');
  const num = v('b-num'), date = v('b-date'), who = v('b-who'), loc = v('b-loc');
  if (!num||!date||!who||!loc) { toast('Fill all fields.',true); return; }

  const eq = allEquip.find(e => e.num.toLowerCase() === num.toLowerCase());
  if (!eq) { setFieldErr('b-num-err','Equipment not found.'); toast('Equipment not found!',true); return; }

  const status = getLatestStatus(num);
  if (status !== 'Good') {
    setFieldErr('b-num-err', `Status is: ${status||'Unknown'}. Must be Good.`);
    toast('Equipment is not in Good condition!',true); return;
  }

  if (isCurrentlyBorrowed(num)) {
    setFieldErr('b-num-err','Equipment is currently borrowed.');
    toast('Equipment is already borrowed!',true); return;
  }

  // Prevent duplicate offline saves for same equipment+date+borrower
  const dupOffline = offlineBorrows.some(b =>
    b.num.toLowerCase() === num.toLowerCase() &&
    b.date === date &&
    b.borrower.toLowerCase() === who.toLowerCase()
  );
  if (dupOffline) { toast('This borrow entry is already pending sync.',true); return; }

  const entry = { num, date, borrower: who, location: loc, returned: false, returnDate: null,
    createdAt: new Date().toISOString() };

  if (navigator.onLine) {
    try {
      const ref = await addDoc(collection(db,'borrowLog'), entry);
      allBorrows.push({ id: ref.id, ...entry });
      updateStats(); renderBorrows();
      ['b-num','b-who','b-loc'].forEach(id => document.getElementById(id).value = '');
      setToday();
      toast('Borrow logged!');
    } catch(e) {
      // Save offline on error
      offlineBorrows.push(entry);
      localStorage.setItem('offlineBorrows', JSON.stringify(offlineBorrows));
      toast('Error — saved offline.');
    }
  } else {
    offlineBorrows.push(entry);
    localStorage.setItem('offlineBorrows', JSON.stringify(offlineBorrows));
    allBorrows.push({ id: 'offline_'+entry.createdAt, ...entry });
    updateStats(); renderBorrows();
    ['b-num','b-who','b-loc'].forEach(id => document.getElementById(id).value = '');
    setToday();
    toast('Saved offline. Will sync when online.');
  }
};

window.markReturn = async function(id, checked) {
  const b = allBorrows.find(x => x.id === id); if (!b) return;
  const returnDate = checked ? new Date().toLocaleDateString('en-GB') : null;
  try {
    await updateDoc(doc(db,'borrowLog',id), { returned: checked, returnDate });
    b.returned = checked; b.returnDate = returnDate;
    updateStats(); renderBorrows();
    if (checked) toast(b.num + ' marked as returned.');
    await loadAllData();
  } catch(e) { toast('Error updating borrow.',true); }
};

function renderBorrows() {
  const tb = document.getElementById('btbody');
  const active = allBorrows.filter(b => b.returned !== true && b.returned !== 'Yes');
  if (!active.length) {
    tb.innerHTML = '<tr><td colspan="5"><div class="empty">NO ACTIVE BORROWS</div></td></tr>';
    return;
  }
  tb.innerHTML = active.map(b => `
    <tr>
      <td><span style="font-family:var(--fm);color:var(--accent)">${b.num}</span></td>
      <td>${b.borrower}</td><td>${b.date}</td><td>${b.location}</td>
      <td><div class="rcell">
        <input type="checkbox" class="rc" onchange="markReturn('${b.id}',this.checked)"/>
        <span style="font-family:var(--fm);font-size:.72rem;color:var(--muted)">Mark returned</span>
      </div></td>
    </tr>`).join('');
}

// ── STATUS ────────────────────────────────────────────────────
window.submitStatus = async function() {
  setFieldErr('s-num-err','');
  const num    = v('s-num');
  let   status = v('s-stat');
  const date   = v('s-date') || new Date().toISOString().split('T')[0];
  if (!num||!status) { toast('Fill all fields.',true); return; }

  const exists = allEquip.some(e => e.num.toLowerCase() === num.toLowerCase());
  if (!exists) { setFieldErr('s-num-err','Equipment not found.'); toast('Equipment not found!',true); return; }

  if (isCurrentlyBorrowed(num)) {
    setFieldErr('s-num-err','Equipment is borrowed. Return it first.');
    toast('Cannot update — equipment is borrowed!',true); return;
  }

  // If Returned, concatenate with previous status
  if (status === 'Returned') {
    const prevStatus = getLatestStatus(num);
    if (prevStatus && prevStatus !== 'Returned') {
      status = 'Returned-' + prevStatus;
    }
  }

  try {
    const logDate = new Date(date).toISOString();
    // Log as new entry instead of overwriting
    await addDoc(collection(db,'statusLog'), { num, status, date: logDate });
    allStatus.push({ num, status, date: logDate });
    updateStats();
    toast(`Status logged: ${num} → ${status}`);
    document.getElementById('s-num').value = '';
    document.getElementById('s-stat').value = '';
    document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
  } catch(e) { toast('Error logging status.',true); console.error(e); }
};
</script>
